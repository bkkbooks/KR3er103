body:
  text: 醫津一筏醫以寒治熱以熱治寒以俏導治積以快藥泄滿以補治虛羸以澀固脫以利下攻秘以潤治渴以辛溫散表以香燥理氣以寒涼止血以通止痛以養血治不得眠以補兼滑治脉遲澀以清且斂治脉洪大以下氣清火治上逆以利水通淋治水泛溢以涼表治發熱雖在下愚不難措手惟是以寒治寒如諸寒鼓僳如喪神守皆屬於火是也以熱治執如發表不遠熱是也以補治積所謂養正積自除是也以益氣治滿所謂滿用術甘是也以下治利所謂通因通用是也以提氣治閉如小便不利用補中益氣是也以泄水治渴如五令散治消渴是也以寒散表如四時感冒怫熱自內而達於外藥用苦寒酸寒是也以涼平理氣丹溪所謂氣有餘便是火是也以溫補止血如黃土湯桃花湯是也以攻擊治不得眠如胃不和則臥不安又痰在膽經神不歸舍是也以利下治遲澀之脉如脉渥而滑有宿食又脉澀不減爲中焦實是也以補中治洪大之脉如內傷用補中益氣湯是也以溫中治嶇逆如吳茱萸湯大半夏湯是也以固表和營治水如水在皮中四肢聶面動防已茯苓湯是也以實表出汗治太陽中風如桂枝湯是也以攻下及補益治發熱如表無熱而裏有熱是也如此之類苟條分縷析何可殫述雖在上智亦費推求前哲非不深切著明後人動手便錯者良由但知治法之所當然而不知治法之所以然也不揣蔬略謹將疑似難用之理提綱挈領本之內經論其大概俾縱醫者一舉三反觸類旁通所謂比類奇恆或在於是噫醫道之廢也久矣在往古翰墨諸臣奉敕箋註醫書尚且隨文順釋頗多訛舛況目不辨魯魚之人不過藉以牟利反能深惟其義乎然其解嘲巧詆則曰盡信書則不如無書今天下稽古之士凡奧旨鴻裁正不當與若輩瞥見也治病必求其本劉澹庵曰下癥安胎必用驅逐峻劑雖有故無殞然不定其虛實而施之恐非定法也有者求之無者求之盛者責之虛者責之張漢瓿曰氣血即神之窟宅不治氣血何由治神以神治神立論如此尚須著落耳吾常謂談醫之道不可一語模糊令人徒作天際真人想也張永孚曰相火稟命於命門真水先天水火原屬同宮水以火爲主以水爲原下論曰設使陰虛此火失其窟宅陰虛即水虧火脫出即陽虛豈六味加知柏反可平之者耶劉澹庵曰汗多亡衞外之陽下多亡主內之陰二者應之速汗不過一汗再汗下不過一下再下而遂亡陽亡陰辛熱損陰苦寒傷陽則有漸積使然張漢瓿曰血陰氣陽二者屬人未見其有餘少一分陰便多一分火火有餘則似氣有餘也如此說方透疏其氣血令其調達而致和平劉澹庵曰人身別有一主非心也謂之君主之官當與十二官平等不得獨尊心之官爲主若以心之官爲主則下文主不明則十二官危當云十一官矣此趙無閭所見甚超也適事爲故反佐以取之從少從多觀其事也張漢瓿曰小便赤變有中寒而如是虛人老人恆多溺色變熱則一未應說也必伏其所主而先其所因張永孚曰營衞受邪而實當言衞受邪而實則營失其衞而裏爲之虛不然表實裏虛一語終欠明耳寒之而熱者取之陰熱之而寒者取之陽各求其屬明知逆順正行無間劉澹庵曰嘔衂用苦寒下之是逐瘀血也然不若慎用苦寒無使血瘀不愈於下之乎推本陰陽劉澹庵曰老人陰虛者固有陰虛者更多有服參耆附桂而人不容已始長年而安保者則何故耶是說當論活些勿執食養盡之毋使過之傷其正也張漢瓿曰精不足者補之以味斷厚味在看何病宐何當忌則是如腫脹食鹽助邪可類推矣若一意教人淡食則恐胃氣日憊精神頓消而不可回者矣若肥昧淡煮可謂得情微妙在脉不可不察張永孚曰內經以臟腑上下分部位候診叔和則以臟腑相絡而候診不妨並存其說不爲悖理必先歲氣無伐天和劉澹庵曰古今異氣方隅異宐主氣或同客氣則定有不同者此在察其氣以知所感者何屬爲多比而同施而治之自不可也有毒無毒固宐常制矣自跋
